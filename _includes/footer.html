<footer class="site-footer">
  <div class="wrapper topround bottomround">
    <div class="footer-inner">

      <div class="footer-icons">
        {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}" title="GitHub" aria-label="GitHub">
          <i class="fa-brands fa-github"></i>
        </a>
        {% endif %}
        {% if site.linkedin_username %}
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" title="LinkedIn" aria-label="LinkedIn">
          <i class="fa-brands fa-linkedin"></i>
        </a>
        {% endif %}
        {% if site.strava_id %}
        <a href="https://www.strava.com/athletes/{{ site.strava_id }}" title="Strava" aria-label="Strava">
          <i class="fa-brands fa-strava"></i>
        </a>
        {% endif %}
        {% if site.soundcloud_username %}
        <a href="https://soundcloud.com/{{ site.soundcloud_username }}" title="SoundCloud" aria-label="SoundCloud">
          <i class="fa-brands fa-soundcloud"></i>
        </a>
        {% endif %}
        {% if site.mathse_username %}
        <a href="https://math.stackexchange.com/users/{{ site.mathse_username }}" title="Math Stack Exchange" aria-label="Math Stack Exchange">
          <i class="fa-brands fa-stack-exchange"></i>
        </a>
        {% endif %}
        <a href="{{ site.url }}/feed.xml" title="RSS Feed" aria-label="RSS Feed">
          <i class="fa-solid fa-rss"></i>
        </a>
      </div>

      <div class="footer-credit">
        Made with <i class="fa-solid fa-heart"></i> using
        <a href="https://jekyllrb.com">Jekyll</a>
        &middot;
        <a href="https://github.com/hemangsk/Gravity">Gravity</a>
      </div>

    </div>
  </div>
</footer>
