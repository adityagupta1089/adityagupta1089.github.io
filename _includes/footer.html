<footer class="site-footer">

  <div class="wrapper topround bottomround">

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list footer-content">
          <li>Forked &amp; modified from
            <a href="https://github.com/hemangsk/Gravity">Gravity</a>
          </li>
          <li>Made with <i class="fa-solid fa-heart"></i> using
            <a href="https://jekyllrb.com">Jekyll</a>
          </li>
        </ul>
      </div>

      <div class="footer-col footer-col-2 footer-content">
        <ul class="social-media-list">
          {% if site.github_username %}
          <li>
            <a href="https://github.com/{{ site.github_username }}">
              <i class="fa-brands fa-github"></i> {{ site.github_username }}
            </a>
          </li>
          {% endif %}
          {% if site.linkedin_username %}
          <li>
            <a href="https://linkedin.com/in/{{ site.linkedin_username }}">
              <i class="fa-brands fa-linkedin"></i> {{ site.linkedin_username }}
            </a>
          </li>
          {% endif %}
          {% if site.strava_id %}
          <li>
            <a href="https://www.strava.com/athletes/{{ site.strava_id }}">
              <i class="fa-brands fa-strava"></i> Strava
            </a>
          </li>
          {% endif %}
        </ul>
      </div>

      <div class="footer-col footer-col-3 footer-content">
        <a href="{{ site.url }}/feed.xml">
          <i class="fa-solid fa-rss"></i> RSS Feed
        </a>
      </div>
    </div>

  </div>

</footer>
