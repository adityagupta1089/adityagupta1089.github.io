<script>
  var posts = [
    {% for post in site.posts %}"{{ post.url }}"{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];
  window.location.replace(posts[Math.floor(Math.random() * posts.length)]);
</script>
<p style="text-align:center;padding:3rem;opacity:0.5;">Redirecting to a random post…</p>
